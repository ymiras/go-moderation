version: '3.8'

services:
  dify-moderation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dify-moderation
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      - MODERATION_SERVER_PORT=8080
      - MODERATION_LOG_LEVEL=info
      - MODERATION_LOG_ENCODING=json
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - dify-moderation-network

networks:
  dify-moderation-network:
    driver: bridge
